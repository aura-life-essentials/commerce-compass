<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary Meta Tags -->
    <title>TrendVault - Viral Products & Trending Deals | Shop Now</title>
    <meta name="title" content="TrendVault - Viral Products & Trending Deals" />
    <meta name="description" content="Discover curated viral products, trending deals, and exclusive flash sales. Shop TikTok-famous gadgets, lifestyle essentials, and more with fast shipping." />
    <meta name="keywords" content="viral products, trending deals, TikTok products, flash sales, gadgets, lifestyle, online shopping" />
    <meta name="author" content="TrendVault" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://trendvault.store" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trendvault.store/" />
    <meta property="og:title" content="TrendVault - Viral Products & Trending Deals" />
    <meta property="og:description" content="Discover curated viral products, trending deals, and exclusive flash sales. Shop TikTok-famous gadgets with fast shipping." />
    <meta property="og:image" content="https://trendvault.store/og-image.jpg" />
    <meta property="og:site_name" content="TrendVault" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://trendvault.store/" />
    <meta name="twitter:title" content="TrendVault - Viral Products & Trending Deals" />
    <meta name="twitter:description" content="Shop trending viral products with exclusive deals and fast shipping." />
    <meta name="twitter:image" content="https://trendvault.store/og-image.jpg" />

    <!-- Apple Touch Icon & PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TrendVault" />
    <meta name="theme-color" content="#0a0a0b" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Structured Data for E-commerce -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TrendVault",
      "url": "https://trendvault.store",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://trendvault.store/store?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TrendVault",
      "url": "https://trendvault.store",
      "logo": "https://trendvault.store/logo.png",
      "sameAs": []
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
